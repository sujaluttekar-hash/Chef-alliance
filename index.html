<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chef Alliance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f8fafc}
.card{background:white;border-radius:18px;box-shadow:0 6px 24px rgba(0,0,0,0.05)}
.btn{border-radius:12px;padding:10px 14px;font-weight:600;transition:0.2s}
.btn-primary{background:#4f46e5;color:white}
.btn-primary:hover{background:#4338ca}
.input{border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:14px;width:100%;background:#f9fafb}
.input:focus{outline:none;border-color:#6366f1;background:white}
.label{font-size:12px;color:#64748b;font-weight:600;margin-bottom:4px}
.sidebar{width:220px;background:white;border-right:1px solid #e5e7eb}
.nav-item{padding:10px 14px;border-radius:10px;font-size:14px;font-weight:500;color:#475569;cursor:pointer}
.nav-item:hover{background:#f1f5f9}
.nav-active{background:#eef2ff;color:#4f46e5}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState} = React;
const {createRoot} = ReactDOM;

// LOGIN
function Login({onLogin}){
  const [phone,setPhone]=useState('');

  return (
    React.createElement('div',{className:'min-h-screen flex items-center justify-center'},
      React.createElement('div',{className:'card p-8 w-full max-w-sm'},
        React.createElement('h1',{className:'text-xl font-bold mb-6 text-slate-800'},'Chef Alliance'),
        React.createElement('div',{className:'mb-4'},
          React.createElement('div',{className:'label'},'Phone Number'),
          React.createElement('input',{className:'input',value:phone,onChange:e=>setPhone(e.target.value),placeholder:'Enter number'})
        ),
        React.createElement('button',{className:'btn btn-primary w-full',onClick:()=>onLogin({name:'Sujal',role:'ADMIN'})},'Login')
      )
    )
  )
}

// DASHBOARD
function Dashboard(){
  return (
    React.createElement('div',{className:'space-y-6'},
      React.createElement('h1',{className:'text-2xl font-bold text-slate-800'},'Dashboard'),

      React.createElement('div',{className:'grid grid-cols-3 gap-4'},
        ['Total Audits','Avg Score','Vendors'].map(t=>
          React.createElement('div',{className:'card p-4'},
            React.createElement('p',{className:'text-sm text-slate-500'},t),
            React.createElement('p',{className:'text-xl font-bold text-slate-800 mt-1'},'--')
          )
        )
      ),

      React.createElement('div',{className:'card p-6'},
        React.createElement('h2',{className:'font-semibold mb-4 text-slate-700'},'Recent Activity'),
        React.createElement('p',{className:'text-sm text-slate-400'},'No data yet')
      )
    )
  )
}

// AUDITS PAGE
function Audits(){
  return (
    React.createElement('div',{className:'space-y-6'},
      React.createElement('div',{className:'flex justify-between items-center'},
        React.createElement('h1',{className:'text-2xl font-bold text-slate-800'},'Audits'),
        React.createElement('button',{className:'btn btn-primary'},'+ New Audit')
      ),

      React.createElement('div',{className:'card p-6 text-sm text-slate-400'},'No audits yet')
    )
  )
}

// VENDORS PAGE
function Vendors(){
  return (
    React.createElement('div',{className:'space-y-6'},
      React.createElement('h1',{className:'text-2xl font-bold text-slate-800'},'Vendors'),
      React.createElement('div',{className:'card p-6 text-sm text-slate-400'},'No vendors yet')
    )
  )
}

// MAIN APP LAYOUT
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('dashboard');

  if(!user) return React.createElement(Login,{onLogin:setUser});

  return (
    React.createElement('div',{className:'flex min-h-screen'},

      // SIDEBAR
      React.createElement('div',{className:'sidebar p-4 space-y-2'},
        React.createElement('div',{className:'text-lg font-bold text-slate-800 mb-6'},'Chef Alliance'),

        ['dashboard','audits','vendors'].map(t=>
          React.createElement('div',{
            key:t,
            onClick:()=>setTab(t),
            className:`nav-item ${tab===t?'nav-active':''}`
          },t.charAt(0).toUpperCase()+t.slice(1))
        )
      ),

      // CONTENT
      React.createElement('div',{className:'flex-1 p-6'},
        React.createElement('div',{className:'flex justify-between items-center mb-6'},
          React.createElement('span',{className:'text-sm text-slate-500'},`Welcome, ${user.name}`),
          React.createElement('button',{onClick:()=>setUser(null),className:'text-sm text-red-500'},'Logout')
        ),

        tab==='dashboard' && React.createElement(Dashboard),
        tab==='audits' && React.createElement(Audits),
        tab==='vendors' && React.createElement(Vendors)
      )
    )
  )
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
