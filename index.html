<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chef Alliance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);border-radius:20px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 10px 40px rgba(0,0,0,0.4);transition:all .3s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.btn{border-radius:12px;padding:10px 14px;font-weight:600;transition:all .25s ease}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(99,102,241,0.6)}
.input{border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px;font-size:14px;width:100%;background:rgba(255,255,255,0.05);color:white}
.input:focus{outline:none;border-color:#8b5cf6;background:rgba(255,255,255,0.08)}
.label{font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:4px}
.sidebar{width:240px;background:rgba(15,23,42,0.8);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.08)}
.nav-item{padding:12px 16px;border-radius:12px;font-size:14px;font-weight:500;color:#cbd5f5;cursor:pointer;transition:all .2s}
.nav-item:hover{background:rgba(99,102,241,0.15);color:white}
.nav-active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;box-shadow:0 6px 20px rgba(99,102,241,0.5)}
.fade-in{animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState} = React;
const {createRoot} = ReactDOM;

function Login({onLogin}){
  const [phone,setPhone]=useState('');

  return (
    React.createElement('div',{className:'min-h-screen flex items-center justify-center fade-in'},
      React.createElement('div',{className:'card p-8 w-full max-w-sm'},
        React.createElement('h1',{className:'text-xl font-bold mb-6'},'Chef Alliance'),
        React.createElement('div',{className:'mb-4'},
          React.createElement('div',{className:'label'},'Phone Number'),
          React.createElement('input',{className:'input',value:phone,onChange:e=>setPhone(e.target.value),placeholder:'Enter number'})
        ),
        React.createElement('button',{className:'btn btn-primary w-full',onClick:()=>onLogin({name:'Sujal',role:'ADMIN'})},'Login')
      )
    )
  )
}

function Dashboard(){
  return (
    React.createElement('div',{className:'space-y-6 fade-in'},
      React.createElement('h1',{className:'text-2xl font-bold'},'Dashboard'),

      React.createElement('div',{className:'grid grid-cols-3 gap-4'},
        ['Total Audits','Avg Score','Vendors'].map(t=>
          React.createElement('div',{className:'card p-5'},
            React.createElement('p',{className:'text-sm text-slate-400'},t),
            React.createElement('p',{className:'text-2xl font-bold mt-1'},'--')
          )
        )
      ),

      React.createElement('div',{className:'card p-6'},
        React.createElement('h2',{className:'font-semibold mb-4'},'Recent Activity'),
        React.createElement('p',{className:'text-sm text-slate-400'},'No data yet')
      )
    )
  )
}

function Audits(){
  return (
    React.createElement('div',{className:'space-y-6 fade-in'},
      React.createElement('div',{className:'flex justify-between items-center'},
        React.createElement('h1',{className:'text-2xl font-bold'},'Audits'),
        React.createElement('button',{className:'btn btn-primary'},'+ New Audit')
      ),
      React.createElement('div',{className:'card p-6 text-sm text-slate-400'},'No audits yet')
    )
  )
}

function Vendors(){
  return (
    React.createElement('div',{className:'space-y-6 fade-in'},
      React.createElement('h1',{className:'text-2xl font-bold'},'Vendors'),
      React.createElement('div',{className:'card p-6 text-sm text-slate-400'},'No vendors yet')
    )
  )
}

function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('dashboard');

  if(!user) return React.createElement(Login,{onLogin:setUser});

  return (
    React.createElement('div',{className:'flex min-h-screen'},

      React.createElement('div',{className:'sidebar p-4 space-y-2'},
        React.createElement('div',{className:'text-lg font-bold mb-6'},'Chef Alliance'),

        ['dashboard','audits','vendors'].map(t=>
          React.createElement('div',{
            key:t,
            onClick:()=>setTab(t),
            className:`nav-item ${tab===t?'nav-active':''}`
          },t.charAt(0).toUpperCase()+t.slice(1))
        )
      ),

      React.createElement('div',{className:'flex-1 p-6'},
        React.createElement('div',{className:'flex justify-between items-center mb-6'},
          React.createElement('span',{className:'text-sm text-slate-400'},`Welcome, ${user.name}`),
          React.createElement('button',{onClick:()=>setUser(null),className:'text-sm text-red-400'},'Logout')
        ),

        tab==='dashboard' && React.createElement(Dashboard),
        tab==='audits' && React.createElement(Audits),
        tab==='vendors' && React.createElement(Vendors)
      )
    )
  )
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
