<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chef Alliance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f0f9ff,#e0f2fe,#fdf2f8);color:#0f172a}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,0.12)}
.btn{border-radius:12px;padding:10px 16px;font-weight:600;transition:.3s}
.btn-primary{background:linear-gradient(135deg,#22c55e,#06b6d4);color:white}
.btn-primary:hover{transform:scale(1.05)}
.input{border:1px solid #e2e8f0;border-radius:12px;padding:12px;width:100%;background:white}
.input:focus{outline:none;border-color:#06b6d4}
.sidebar{width:240px;background:white;border-right:1px solid #e2e8f0}
.nav{padding:12px 16px;border-radius:10px;cursor:pointer;font-weight:500;color:#475569}
.nav:hover{background:#e0f2fe;color:#0284c7}
.active{background:linear-gradient(135deg,#22c55e,#06b6d4);color:white}
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState}=React;
const {createRoot}=ReactDOM;

function Login({onLogin}){
  const [phone,setPhone]=useState('');
  return (
    React.createElement('div',{className:'min-h-screen flex items-center justify-center'},
      React.createElement('div',{className:'card w-full max-w-md fade text-center'},
        React.createElement('h1',{className:'text-3xl font-bold mb-2 text-cyan-600'},'Chef Alliance'),
        React.createElement('p',{className:'text-gray-500 mb-6'},'Bright & Smart Audit System'),
        React.createElement('input',{className:'input mb-4',value:phone,onChange:e=>setPhone(e.target.value),placeholder:'Enter Phone Number'}),
        React.createElement('button',{className:'btn btn-primary w-full',onClick:()=>onLogin({name:'Sujal'})},'Login')
      )
    )
  )
}

function Stat({title,value}){
  return React.createElement('div',{className:'card'},
    React.createElement('p',{className:'text-gray-500 text-sm'},title),
    React.createElement('h2',{className:'text-3xl font-bold mt-2 text-cyan-600'},value)
  )
}

function Dashboard(){
  return (
    React.createElement('div',{className:'space-y-6 fade'},
      React.createElement('h1',{className:'text-3xl font-bold text-cyan-700'},'Dashboard'),
      React.createElement('div',{className:'grid grid-cols-3 gap-6'},
        React.createElement(Stat,{title:'Total Audits',value:'124'}),
        React.createElement(Stat,{title:'Avg Score',value:'92%'}),
        React.createElement(Stat,{title:'Vendors',value:'38'})
      ),
      React.createElement('div',{className:'card'},
        React.createElement('h2',{className:'font-semibold mb-2'},'Activity'),
        React.createElement('p',{className:'text-gray-500'},'Everything looks great 🎉')
      )
    )
  )
}

function Audits(){
  return (
    React.createElement('div',{className:'fade'},
      React.createElement('div',{className:'flex justify-between mb-4'},
        React.createElement('h1',{className:'text-3xl font-bold text-cyan-700'},'Audits'),
        React.createElement('button',{className:'btn btn-primary'},'+ New')
      ),
      React.createElement('div',{className:'card text-gray-500'},'No audits yet')
    )
  )
}

function Vendors(){
  return (
    React.createElement('div',{className:'fade'},
      React.createElement('h1',{className:'text-3xl font-bold mb-4 text-cyan-700'},'Vendors'),
      React.createElement('div',{className:'card text-gray-500'},'No vendors yet')
    )
  )
}

function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('dashboard');

  if(!user) return React.createElement(Login,{onLogin:setUser});

  return (
    React.createElement('div',{className:'flex min-h-screen'},

      React.createElement('div',{className:'sidebar p-4 space-y-3'},
        React.createElement('h2',{className:'text-xl font-bold text-cyan-600 mb-6'},'Chef Alliance'),
        ['dashboard','audits','vendors'].map(t=>
          React.createElement('div',{
            key:t,
            onClick:()=>setTab(t),
            className:`nav ${tab===t?'active':''}`
          },t.toUpperCase())
        )
      ),

      React.createElement('div',{className:'flex-1 p-8'},
        React.createElement('div',{className:'flex justify-between mb-6'},
          React.createElement('span',{className:'text-gray-600'},`Welcome, ${user.name}`),
          React.createElement('button',{onClick:()=>setUser(null),className:'text-red-500'},'Logout')
        ),

        tab==='dashboard' && React.createElement(Dashboard),
        tab==='audits' && React.createElement(Audits),
        tab==='vendors' && React.createElement(Vendors)
      )
    )
  )
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
